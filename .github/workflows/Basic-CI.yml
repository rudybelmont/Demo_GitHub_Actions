name: Basic CI Demo

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Repository checked out successfully"
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Simulate build output
        run: |
          mkdir -p artifacts/build
          echo "Build completed successfully on $(date)" > artifacts/build/build.txt
          echo "Repository: $GITHUB_REPOSITORY" >> artifacts/build/build.txt
          echo "Actor: $GITHUB_ACTOR" >> artifacts/build/build.txt
          echo "Ref: $GITHUB_REF" >> artifacts/build/build.txt

      - name: Simulate test report
        run: |
          mkdir -p artifacts/test-results
          cat <<EOF > artifacts/test-results/test-report.txt
          TEST REPORT
          ===========
          Status: PASSED
          Workflow: $GITHUB_WORKFLOW
          Run ID: $GITHUB_RUN_ID
          Commit: $GITHUB_SHA
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts/build

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: artifacts/test-results
