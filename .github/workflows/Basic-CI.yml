name: Node CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: |
          npm run build --if-present
          mkdir -p artifacts/build
          if [ -d dist ]; then
            cp -r dist artifacts/build/dist
          else
            echo "No dist directory found" > artifacts/build/README.txt
          fi

      - name: Test
        run: |
          mkdir -p artifacts/test-results
          npm test --if-present || TEST_EXIT_CODE=$?
          echo "Test step completed" > artifacts/test-results/summary.txt
          exit ${TEST_EXIT_CODE:-0}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output-node-${{ matrix.node-version }}
          path: artifacts/build

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: artifacts/test-results
``
